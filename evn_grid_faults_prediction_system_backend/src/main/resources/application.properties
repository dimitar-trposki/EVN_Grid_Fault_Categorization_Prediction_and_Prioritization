spring.application.name=evn_grid_faults_prediction_system_backend
spring.profiles.active=dev

# Weather Integration (Module 13)
weather.provider=open-meteo
weather.api.base-url=https://api.open-meteo.com/v1
weather.api.timeout-seconds=10
weather.refresh.enabled=true
weather.refresh.cron=0 0 */1 * * *
weather.refresh.only-critical-locations=true

# AI Service Integration (Modules 7, 8, 9)
ai.service.base-url=http://localhost:8000
ai.service.timeout-seconds=10
ai.service.enabled=true